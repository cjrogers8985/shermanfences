<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fence Repair Sherman TX | Free Estimates</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <header class="py-10 text-center">
        <h1 class="text-4xl font-bold text-blue-900">Sherman Fence Repair Pros</h1>
        <p class="mt-4 text-xl">Fast, Reliable Fence & Gate Repair in Sherman, TX</p>
        <div class="mt-6">
            <a href="tel:YOUR_TWILIO_NUMBER" class="bg-blue-600 text-white px-8 py-4 rounded-lg text-2xl font-bold hover:bg-blue-700">
                Call (903) 414-6107
            </a>
        </div>
    </header>

    <section class="max-w-xl mx-auto bg-white p-8 border border-gray-200 rounded-xl shadow-md mb-10">
        <h2 class="text-2xl font-semibold mb-4 text-center">Request a Free Quote</h2>
        <form action="https://formspree.io/f/your_formspree_id" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Name</label>
                <input type="text" name="name" required class="w-full border-gray-300 border p-2 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium">Phone Number</label>
                <input type="tel" name="phone" required class="w-full border-gray-300 border p-2 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium">Type of Repair (Wood, Iron, Gate)</label>
                <textarea name="message" class="w-full border-gray-300 border p-2 rounded-md"></textarea>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-md hover:bg-green-700">
                Send Request
            </button>
        </form>
    </section>
</body>
</html>
